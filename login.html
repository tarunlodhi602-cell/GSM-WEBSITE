<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
   background-image: url("login.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

}

.login-box{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    width: 500px;
    height: 60vh;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);

    border: 5px solid red;
}
.login-box:hover{
    box-shadow: 5px 5px 15px  black;
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}
.input-box input:hover{
    border-bottom: 2px solid red;
    box-shadow: 5px 5px 10px  black;
}

.remember{
    display:flex;
    align-items:center;
    gap:8px;
    margin:10px 0 15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:rgb(212, 47, 47);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:red;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <div class="input-box">
        <label>User ID</label>
        <input type="text" placeholder="Enter User ID">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Enter Password">
    </div>

    <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember Me</label>
    </div>

    <button type="submit">Login</button>

    <div class="footer">
        Forgot Password?
    </div>
</div>

</body>
</html>
